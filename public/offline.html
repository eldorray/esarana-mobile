<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>eSarana — Offline</title>
<style>
  body{font-family:system-ui,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;background:#f8fafc;color:#1e293b}
  .box{text-align:center;padding:2rem}
  .icon{font-size:3rem;margin-bottom:1rem}
  h1{font-size:1.25rem;font-weight:700;margin:0 0 .5rem}
  p{color:#64748b;font-size:.875rem;margin:0 0 1.5rem}
  button{background:#1a56db;color:#fff;border:none;padding:.75rem 2rem;border-radius:.75rem;font-size:.875rem;font-weight:600;cursor:pointer}
</style>
</head>
<body>
<div class="box">
  <div class="icon">📡</div>
  <h1>Tidak ada koneksi</h1>
  <p>Periksa koneksi internet Anda dan coba lagi.</p>
  <button onclick="location.reload()">Coba Lagi</button>
</div>
</body>
</html>
